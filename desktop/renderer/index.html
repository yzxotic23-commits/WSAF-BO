<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Auto Feeding</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>WhatsApp Auto Feeding</h1>
      <p id="app-meta" class="muted"></p>
    </div>
    <div class="topbar-actions">
      <button id="btn-open-data" type="button">Folder data</button>
      <button id="btn-codex-hint" type="button">Codex login</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel accounts-panel">
      <h2>Akun WhatsApp</h2>
      <ul id="account-list" class="account-list"></ul>
      <p class="muted small">Connect via QR di panel kanan. Feeding AI jalan di log bawah.</p>
    </section>

    <section class="panel qr-panel">
      <h2>QR / Pairing</h2>
      <p id="qr-status" class="muted">Pilih akun → Connect (QR)</p>
      <img id="qr-image" alt="QR Code" hidden />
      <div id="pairing-code" class="pairing-code" hidden></div>
    </section>

    <section class="panel controls-panel">
      <h2>Feeding &amp; Settings</h2>
      <label>
        Bahasa sesi
        <select id="feed-language">
          <option value="Indonesia">Indonesia</option>
          <option value="English">English</option>
          <option value="Melayu">Melayu</option>
          <option value="Chinese">Chinese</option>
        </select>
      </label>
      <div class="btn-row">
        <button id="btn-start-feeding" type="button" class="primary">Start feeding</button>
        <button id="btn-stop-feeding" type="button">Stop</button>
      </div>
      <details open>
        <summary>.env</summary>
        <textarea id="env-editor" rows="10" spellcheck="false"></textarea>
        <button id="btn-save-env" type="button">Simpan .env</button>
      </details>
      <details>
        <summary>proxies.txt</summary>
        <textarea id="proxies-editor" rows="6" spellcheck="false"></textarea>
        <button id="btn-save-proxies" type="button">Simpan proxies</button>
      </details>
    </section>

    <section class="panel log-panel">
      <h2>System log</h2>
      <pre id="log-output"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
