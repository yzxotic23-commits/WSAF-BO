# Build installer Windows + macOS di cloud (tanpa perlu Mac fisik).
# Cara pakai: GitHub → tab Actions → "Release Desktop" → Run workflow
# Setelah selesai: unduh artifact "macos-dmg" dan "windows-installer"

name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (DMG + ZIP)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac

      - name: List release artifacts (debug)
        if: always()
        run: ls -la release || true

      - name: Generate update manifest (macOS)
        run: node scripts/generate-update-manifest.js release mac

      - name: Ad-hoc sign (unsigned build, helps Gatekeeper)
        continue-on-error: true
        run: |
          APP=$(find release -name "*.app" -maxdepth 4 | head -1)
          if [ -n "$APP" ]; then
            xattr -cr "$APP" || true
            codesign --force --sign - "$APP" || codesign --force --deep --sign - "$APP" || true
            echo "Signed: $APP"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: List release artifacts (debug)
        if: always()
        shell: pwsh
        run: Get-ChildItem -Path release -ErrorAction SilentlyContinue

      - name: Generate update manifest (Windows)
        run: node scripts/generate-update-manifest.js release win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
