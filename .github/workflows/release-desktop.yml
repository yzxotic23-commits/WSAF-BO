# Build installer Windows + macOS, lalu publish otomatis ke GitHub Releases.
# User app (installer) cek update dari:
#   https://github.com/yzxotic23-commits/WSAF-BO/releases/latest/download/

name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (DMG + ZIP)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac

      - name: Generate update manifest (macOS)
        run: node scripts/generate-update-manifest.js release mac

      - name: Ad-hoc sign (unsigned build, helps Gatekeeper)
        continue-on-error: true
        run: |
          APP=$(find release -name "*.app" -maxdepth 4 | head -1)
          if [ -n "$APP" ]; then
            xattr -cr "$APP" || true
            codesign --force --sign - "$APP" || true
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Generate update manifest (Windows)
        run: node scripts/generate-update-manifest.js release win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

  publish-github-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-upload
          cp -v artifacts/windows-installer/* release-upload/ 2>/dev/null || true
          cp -v artifacts/macos-dmg/* release-upload/ 2>/dev/null || true
          ls -la release-upload
          test "$(ls -1 release-upload | wc -l)" -gt 0

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FeedFlow ${{ github.ref_name }}
          generate_release_notes: true
          files: release-upload/*
          fail_on_unmatched_files: true
